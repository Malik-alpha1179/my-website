<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Gaming</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:linear-gradient(135deg,#050814,#0b1025,#000);
overflow:hidden;
}

.glow{
position:absolute;
width:300px;height:300px;
filter:blur(90px);
opacity:.6;
border-radius:50%;
}
.g1{background:#00eaff;top:-80px;left:-80px;}
.g2{background:#a100ff;bottom:-100px;right:-100px;}

header{
display:flex;
justify-content:space-between;
padding:15px 30px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(10px);
position:sticky;top:0;
}

header div{
font-family:'Orbitron';
color:#00eaff;
font-weight:800;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
font-size:14px;
}

nav a:hover{color:#00eaff;}

.hero{
height:85vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-family:'Orbitron';
font-size:50px;
text-shadow:0 0 20px #00eaff;
}

.hero p{
color:#ccc;
max-width:500px;
}

.btn{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#00eaff,#a100ff);
color:white;
cursor:pointer;
box-shadow:0 0 20px #00eaff;
}

.btn:hover{transform:scale(1.1);}

footer{
position:absolute;
bottom:10px;
width:100%;
text-align:center;
font-size:12px;
color:#888;
}
</style>
</head>

<body>

<div class="glow g1"></div>
<div class="glow g2"></div>

<header>
<div>⚡ ALPHA GAMING</div>
<nav>
<a href="#">Home</a>
<a href="#">Games</a>
<a href="#">Join</a>
<a href="#">Contact</a>
</nav>
</header>

<div class="hero">
<h1>WELCOME GAMER</h1>
<p>Enter the next generation gaming zone with tournaments, rewards and esports action.</p>
<button class="btn">Start Playing</button>
</div>

<footer>© 2026 Alpha Gaming</footer>

</body>
</html>
