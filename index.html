<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Gaming</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
color:white;
background:linear-gradient(135deg,#050814,#0b1025,#000);
min-height:100vh;
overflow-x:hidden;
}

/* Glow background */
.glow{
position:fixed;
width:320px;
height:320px;
filter:blur(120px);
opacity:.5;
border-radius:50%;
z-index:-1;
}
.g1{background:#00eaff;top:-50px;left:-50px;}
.g2{background:#a100ff;bottom:-50px;right:-50px;}

/* NAVBAR */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(12px);
position:sticky;
top:0;
z-index:100;
border-bottom:1px solid rgba(255,255,255,.1);
}

.logo{
font-family:'Orbitron',sans-serif;
color:#00eaff;
font-weight:800;
font-size:20px;
text-shadow:0 0 10px #00eaff;
}

nav{
display:flex;
flex-wrap:wrap;
gap:12px;
}

nav a{
color:white;
text-decoration:none;
font-size:14px;
padding:6px 10px;
border-radius:6px;
transition:.3s;
}

nav a:hover{
background:rgba(0,234,255,.15);
color:#00eaff;
box-shadow:0 0 10px #00eaff;
}

/* HERO */
.hero{
min-height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-family:'Orbitron',sans-serif;
font-size:48px;
margin:0;
text-shadow:0 0 15px #00eaff;
}

.hero p{
color:#ccc;
max-width:600px;
margin-top:15px;
line-height:1.6;
}

.btn{
margin-top:25px;
padding:12px 28px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#00eaff,#a100ff);
color:white;
cursor:pointer;
font-weight:bold;
box-shadow:0 0 20px #00eaff;
transition:.3s;
}

.btn:hover{
transform:scale(1.08);
box-shadow:0 0 35px #00eaff;
}

/* FOOTER */
footer{
text-align:center;
padding:15px;
color:#888;
font-size:12px;
}

/* MOBILE */
@media(max-width:700px){
.hero h1{font-size:34px;}
header{flex-direction:column;gap:10px;}
nav{justify-content:center;}
}

</style>
</head>

<body>

<div class="glow g1"></div>
<div class="glow g2"></div>

<header>
<div class="logo">⚡ ALPHA GAMING</div>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="games.html">Games</a>
<a href="leaderboard.html">Leaderboard</a>
<a href="join.html">Join</a>
<a href="contact.html">Contact</a>
<a href="faq.html">FAQ</a>
</nav>
</header>

<section class="hero">
<h1>WELCOME TO ALPHA GAMING</h1>
<p>Enter the next-generation gaming zone. Compete in tournaments, climb leaderboards, and join the elite gaming community.</p>
<button class="btn">Get Started</button>
</section>

<footer>© 2026 Alpha Gaming</footer>

</body>
</html>
